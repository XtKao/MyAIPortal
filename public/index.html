<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Portal</h1>
            <p>ระบบถาม-ตอบอัจฉริยะ</p>
        </header>
        
        <main>
            <div id="chat-box" class="chat-box">
                </div>
            
            <div class="input-area">
                <textarea id="user-input" placeholder="พิมพ์คำสั่งที่นี่... (กด Shift + Enter เพื่อขึ้นบรรทัดใหม่)" rows="2"></textarea>
                <button id="send-btn">ส่ง</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
